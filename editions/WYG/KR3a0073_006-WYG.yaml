body:
  text: 辨惑編跋延陵謝子蘭先生辨惑編京口用中俞公建業晉仲李公序之噫南方士林多宗二公為師表諸省大比往往先期幣起二公典文衡交恐不逮今詞翰愴然猶在諄諄懇懇為世道人心幸則吾謝先生操心之正積學之博與夫人品髙第有不待歴覽編中已較然知其非好辨者矣後二十五年武進邑大夫董友善陳漢廣尹明善翕然為捐俸鏤板以廣其傳蓋以邪說滔滔將藉此為中流砥柱耳予以寢疾不能從諸賢後然而謝先生為忘年交且嘗游二公之門反覆是編不勝起敬亦重起夫鄉邦耆舊寥寥之思也金壇虞士常拜手敬跋
