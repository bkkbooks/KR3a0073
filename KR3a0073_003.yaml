body:
  text: 辨惑編卷三元謝應芳撰相法相形之術近世或有精之者然致逺恐泥君子不為愚嘗謂聖賢亦自有觀人之法人特不察耳孔子曰視其所以觀其所由察其所安人焉廋哉孟子曰眸子不能掩其惡胸中正則眸子瞭焉胸中不正則眸子眊焉聽其言也觀其眸子人焉廋哉聖賢觀人如此而已若夫死生禍福又豈顔貌間所能盡耶許負之書吾未之學乃所願則學孔孟荀子曰相古之人無有也學者不道也古者有姑布子卿今之世梁有唐舉相人之形狀顔色而知其吉凶妖祥世俗稱之古之人無有也學者不道也故相形不如論心論心不如擇術形不勝心心不勝術術正而心順之形相雖惡而心術善無害為君子也形相雖善而心術惡無害為小人也君子之謂吉小人之謂凶故長短小大善惡形相非吉凶也魏中領軍王肅年六十二疾厲衆醫並以為不愈肅夫人問以遺言肅云朱達平相我踰七十位至三公今皆未也將何慮乎肅竟卒三國志韓子曰昔之聖者其首有若牛者其形有若蛇者其喙有若鳥者有貌若蒙倛者皆貌似而心不同焉可謂非人耶即有平脅曼膚顔如渥丹美而澤者貌則人矣其心則禽獸又惡可謂之人也然貌之是非不若論其心與行事之為不失也文集柳貞公渾年十嵗有稱神巫來告曰若相法當夭且賤幸而為釋可以緩而死耳位祿非若事也公諸父素加撫愛尤所信巫遽命奪去其業從巫之言也公不可且曰夫性命之理聖人所罕言搢紳所不道巫何為而能盡之也且令從之而生去聖人之教而為異術不若速死之愈也於是為學益力其在童幼不惑於怪譎矣子厚文集國語云校魚生其母視之曰必以賄死楊食我生成向之母聞其聲也曰終滅羊舌氏之宗柳子非之曰君子之於人也聽其言而觀其行猶不足以定其禍福以其有幸有不幸也今取赤子之形聲以命其死亡則何耶或者以其鬼事知之乎則知之未必賢也是不足書以示後世皮氏曰今之相工言人相者必曰某類龍某類鳯某類牛馬某至公侯某至卿相類禽獸則富貴也噫立形於天地分性於萬物其貴者不過人焉有真人形而貧賤類禽獸而富貴哉聖人之相人也不差忽微不失纍黍言其善必善言其惡必惡言其勝任必勝任今之人不以是術行其心區區求子卿唐舉之術居其窮處其困不思以道達不能以德進言其有位必翻然自負坐白屋有公侯之姿食藜羮有卿相之色蓋不能自相其心者也相解篇黃山谷先生曰世俗從相貌觀人之法是大不然福本無象何以觀之惟視其人之淺深耳又曰觀人之壽夭必視其用心夫動入欺誑者豈長世之人乎林間録胡忠簡公曰世俗所謂骨相之至貴者宜莫如秀眉重瞳龍顔鳯姿也然堯秀眉魯僖馬卿亦秀眉舜重瞳子項羽朱友敬亦重瞳子漢髙龍顔嵇叔夜亦龍顔文皇鳯姿李相國亦鳯姿然則魯僖沐猴可比堯舜而嵇李可擬漢祖唐宗乎世俗所謂骨相之至惡者宜莫如虎狼蒙倛鳶肩之相也然尼父面如蒙倛陽虎亦如蒙倛竇將軍鳶肩馬賓王亦鳶肩楊食我熊虎之狀班定逺亦燕頷虎頭然則虎可以比尼父而竇之不臣可以比賓王之忠食我之惡可以擬定逺之勳乎文集祿命昔之人以隂陽二行推測祿命而知死生禍福亦問有竒中者矣論其拘泥又不啻如相法焉若今之泛泛售其術者尤不足信知命君子何以惑為愚嘗謂聖賢知人之死生禍福而非隂陽五行之術也孔子曰由也不得其死其後果戰殁於衛孟子曰死矣盆成括未幾果見殺於齊蓋由也行行有不得其死之理括也小有才未聞君子之大道有足以殺其軀之理雖當時幸而獲免聖賢之言猶信也然則學者亦當知此而已祿命之書雖或臆中何足信哉吕才曰祿命之書多言或中人乃信之然長平坑卒未聞共犯三刑南陽貴士何必俱當六合今亦有同年同祿而貴賤懸殊共命共貽而夭壽更異此皆祿命或曰貴與富在我而已以智求則得也何命之為或曰不然求之有不得不求有得皆命也人事何為二子出或問曰二者之言其孰是對曰是皆陷人於不善之言也以智而求盜耕人之田者也皆以為命者弗耕而望收者也吾無取焉爾李翔命解柳氏家訓曰董生有云弔者在門賀者在閭言憂則恐懼恐懼則福至又曰賀者在門弔者在閭言受福則驕奢驕奢則禍至故世族逺長與命位豐約不假問蓍龜星數在處心行事而已熙寧元豐間有僧化成者以命術聞於京師蔡元長兄弟始赴省試同往訪焉時問命者盈門彌日方得前既語以年月率爾語元長曰此武官大使臣命也他時衣食不闕而已餘不可望語元度曰此命甚佳今嵗便當登第十餘年間可為侍從又十年為執政然決不為真相晚年當以使相終既退元長大病其言元度曰觀其推步鹵莽如此何足信哉更候旬日再往訪之則可驗矣旬日復往僧已不復記再以年月語之率爾而言悉如前説兄弟相顧大驚然是年遂同登科自是相繼貴顯以此知所謂命者類不可信其有合者皆偶中也却掃篇邵康節有疾張橫渠問曰先生論命否曰若天命則已知之世俗所謂命則不知也張曰載尚何言事略或問朱子曰數學如康節之説皆一定不可易如何曰也只是隂陽盛衰消長大數可見今人説康節之數謂一事一物皆有成敗之時都説得膚淺了潘時舉問曰孟子之言命與今世俗之言命者正相反孟子謂知命者不立巖墻之下今人却道我命若未死縱立在巖墻之下也不到壓死先生云莫非命者是活絡在這裏看他如何來若先説道我自有命雖立巖墻之下也不妨即是先指定一箇命如此便是紂説不有命在天相似有日者謁黃直卿云善算星數知人禍福直卿曰吾亦有箇大算數書曰惠迪吉從逆凶作善降之百祥作不善降之百殃大學曰言悖而出者亦悖而入貨悖而入者亦悖而出此箇數亘古今不差豈不優於子之算數乎鶴林玉露方位方位細事也然庸巫謬卜從而神之禁忌百端祈禳無已甚者毁垣撤屋有不能一朝居者其為害亦豈小哉爰述所聞以牖愚俗荀子曰武王之誅紂也行之日以兵忌東面而迎太嵗至汜而汜至懷而懷至共頭而山隊霍叔懼曰出三日而五災至無乃不可乎周公曰刳比干而囚箕子飛亷惡來知政失又惡有不可焉尸子曰武王伐紂魚辛諫曰嵗在北方不北征武王不從漢書曰隂陽家者流蓋出於羲和之官敬順昊天厯象日月星辰敬授人時此其所長也及拘者為之則牽於禁忌泥於小數舍人事而任鬼神吕才曰近世巫覡妄分五姓如張王為商武庾為羽似取諧韻至於以柳為宫以趙為角又復不類或同出一姓分屬宫商或復姓數字莫辨徵羽此則事不稽古義理乖僻者也唐書唐司𨽻校尉趙興每入官舍輒更繕修館宇移穿改築故犯妖禁子孫世為司𨽻德宗建中元年九月宣政殿廊壞將作奏十月魁罡未可修上曰但不妨公害人則吉矣命修之代宗葬元陵將發引上見輼輬不當馳道問其故有司對曰陛下本命在午不敢衝也上哭曰安有枉靈駕而謀身利乎命改轅直午而行宋嘉祐中將修東華門太史曰太嵗在東不可犯仁皇帝批其奏曰東家之西乃西家之東西家之東乃東家之西太嵗果何在其興工勿忌續通鑑時日夫內事用柔日外事用剛日者聖人順隂陽之理初不以死生榮辱貧賤富貴之類一皆繫乎年月日時之吉凶而使人拘拘焉擇而用之孟子曰天時不如地利地利不如人和舉一物而天下之物莫不皆然亦盡乎人事而已夫天時何足泥哉公車以反支日不受章奏明帝聞而怪之曰民棄農桑逺來詣闕而復拘以禁忌豈為政之意乎於是遂蠲其制後漢後魏武帝討賀驎太史令姚崇曰紂以甲子亡兵家忌之帝曰紂以甲子亡周武王不以甲子興乎崇無以對進兵大破之北史宋武帝攻慕容超諸將曰往亡兵家所忌帝曰我往彼亡吉孰大焉遂平廣固南史唐太宗貞觀五年有司言皇太子冠用二月吉請追兵備儀仗上曰東作方興宜改用十月少傅蕭瑀奏據隂陽書不若二月上曰吉凶在人若動依隂陽不顧禮義吉可得乎循正而行自與吉會農時急務不可失也唐書張公謹卒太宗將出次哭之有司奏曰在辰不可帝曰君臣猶父子也情感於中安有所避遂哭之代宗葬元陵但取七月之期事集而發不復擇日唐莊宗將攻梁司天言嵗不利用兵郭崇韜曰古者命將鑿凶門而出況成算已決區區常談豈足信也八日而滅梁五代史程子曰如隂陽擇日之事今人信者必惑不信者亦是孟浪不信如出行忌太白之類太白在西不可西行有人在東方居不成總不西行又却初行日忌次日便不忌次日豈遂不衝太白也如使太白為一人為之則鬼神亦勞矣遺書謝愔見程子子留語因請曰今日將沐子曰豈無他日曰今日吉也子曰豈為士而惑此耶曰愔固無疑在已庸何恤第云不利父母子曰有人呼於市曰毁瓦畫墁則利父母也否則不利父母亦將毁瓦畫墁乎曰此狂人之言也何可信然則子所信者亦狂言爾沈顔曰古者國家將有事乎戎祀必先擇時日以定其期是用備物於有司習儀於禮寺俾臻其慮而戒其誠非所以定決勝負也後之惑者不詳其故推考時日妄生穿鑿斯風不革拘忌益深至使凡庶之家將欲越一溝隍折一葭葦必待擇日而後為之構一衡宇剃一榛蕪必審方位而後為之且吉凶由人焉繫時日夫四逹之衢輪蹄未嘗息也五都之市貨賄未嘗絶也萬家之邑斤斧未嘗斷也七雄之世戰伐未嘗已也其凶也必由於人其吉也必由於人故吉人凶其吉凶人吉其凶一於人之所為而已然則惑者不知其在人也有一不吉則罪於時日矣且用兵謀之將不練之士有能以時日勝者乎不耕之田不實之穀有能以時日種者乎以鐵為金以石為玉有能以時日濟者乎是皆不能也則時日吉凶何有哉洪內翰曰漢武帝時有娶婦家問之某日可取婦五行家曰可堪輿家曰不可建除家曰不吉叢辰家曰大凶厯家曰小凶天官家曰小吉太一家曰大吉辨訟不決以狀聞制曰避諸死忌以五行為主則厯卜諸家自古皆不同矣姑以擇日一事論之一年三百六十日若泥而不通殆無一日可用也容齋隨筆辨惑編卷三
